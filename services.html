<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Services</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fffdf6;
            margin: 0;
            padding: 40px;
        }

        h1 {
            color: #2a6dbb;
        }

        .services {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-top: 40px;
        }

        .box {
            background: #fff4cc;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .box:hover {
            transform: translateY(-5px);
        }

        .box a {
            text-decoration: none;
            color: #2a6dbb;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="box"><a href="services/foreign-trade.html">Foreign Trade Services</a></div>
    <div class="box"><a href="services/ers.html">Enterprise Risk Services (ERS)</a></div>
    <div class="box"><a href="services/fas.html">Financial Advisory Services (FAS)</a></div>
    <div class="box"><a href="services/insurance.html">Insurance Solutions</a></div>

</div>

</html>
